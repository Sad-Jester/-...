<!doctype html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/menu.css">
    <link rel="stylesheet" href="/css/profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <div class="header-container">
            <div class="nav-menu">
                <div class="logo-area"><span>Мой проект</span></div>
                    <div class="nav-links">
                        <a href="/profile" class="nav-item active"><span>Личный кабинет</span></a>
                        <a href="/projects" class="nav-item admin-only" id="projects-link"><span>Проекты</span></a>
                        <div class="nav-item-dropdown admin-only" id="dropdownBtn">
                            <span>Справочники ▼</span>
                            <div class="dropdown-content" id="dropdownContent">
                                <a href="/programms">Программы</a>
                                <a href="/schools">Школы</a>
                            </div>
                        </div>
                        <a href="/users" class="nav-item admin-only" id="users-link"><span>Пользователи</span></a>
                        <button class="logout-btn-menu" id="logout-btn-menu"><span>Выйти</span></button>
                    </div>
            </div>
        </div>
    </header>

    <main>
        <div class="profile-container">

            <div class="profile-sidebar">
                <div class="avatar">
                    <div class="avatar-placeholder" id="avatar-placeholder"><span id="avatar-initials"></span></div>
                </div>
                <div class="user-short-info">
                    <h3 id="short-name"></h3>
                    <p id="short-login"></p>
                </div>
            </div>

            <div class="profile-content">

                <div id="message" class="message"></div>

                <form id="profile-form" class="profile-form" novalidate>
                    <div class="form-group">
                        <label for="login">Логин</label>
                        <input type="text" id="login" name="login" disabled>
                    </div>

                    <div class="form-group">
                        <label for="surname">Фамилия <span class="required">*</span></label>
                        <input type="text" id="surname" name="surname">
                        <div id="surname-error" class="field-error" style="display: none;"></div>
                    </div>

                    <div class="form-group">
                        <label for="name">Имя <span class="required">*</span></label>
                        <input type="text" id="name" name="name">
                        <div id="name-error" class="field-error" style="display: none;"></div>
                    </div>

                    <div class="form-group">
                        <label for="patronymic">Отчество</label>
                        <input type="text" id="patronymic" name="patronymic">
                    </div>

                    <div class="form-group">
                        <label for="email">Email <span class="required">*</span></label>
                        <input type="email" id="email" name="email">
                        <div id="email-error" class="field-error" style="display: none;"></div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="save-btn">Сохранить</button>
                        <button type="button" id="cancel-btn" class="cancel-btn">Отменить</button>
                    </div>
                </form>

                <div class="change-password-section">
                    <form id="password-form" class="password-form" novalidate>
                        <div class="form-group">
                            <label for="current-password">Текущий пароль <span class="required">*</span></label>
                            <input type="password" id="current-password">
                            <div id="current-password-error" class="field-error" style="display: none;"></div>
                        </div>
                        <div class="form-group">
                            <label for="new-password">Новый пароль <span class="required">*</span></label>
                            <div class="password-wrapper">
                                <input type="password" id="new-password">
                            </div>
                            <div id="new-password-error" class="field-error" style="display: none;"></div>
                        </div>
                        <div class="form-group">
                            <label for="confirm-password">Подтвердите новый пароль <span class="required">*</span></label>
                            <div class="password-wrapper">
                                <input type="password" id="confirm-password">
                            </div>
                            <div id="confirm-password-error" class="field-error" style="display: none;"></div>
                        </div>
                        <button type="submit" class="change-password-btn">Сменить пароль</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-section">
                <h4>Тестовый проект</h4>
                <p>Веб-приложение для демонстрации навыков разработки</p>
            </div>
            <div class="footer-section">
                <h4>Контакты</h4>
                <p>test@example.com</p>
                <p>github.com/alexcrim</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Мой тестовый проект</p>
        </div>
    </footer>

    <script src="/js/utils.js"></script>
    <!-- <script src="/js/cookies.js"></script> -->
    <script src="/js/profile.js"></script>

</body>

</html>
